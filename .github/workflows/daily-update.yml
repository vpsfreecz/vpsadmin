name: Daily update
on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: Update scope
        required: true
        default: gems
        type: choice
        options:
          - gems
          - webui
          - all
      vpsadminos_input:
        description: Optional vpsAdminOS flake input override
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31

      - name: Read Ruby series
        id: ruby-version
        run: |
          set -euo pipefail
          # ruby/setup-ruby resolves exact 3.4.0 to a preview build on
          # GitHub-hosted runners, so use the latest stable 3.4.x instead.
          echo "version=$(cut -d. -f1,2 .ruby-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby + Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby-version.outputs.version }}
          bundler-cache: true

      - name: Setup git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update gem dependencies
        if: >-
          github.event_name == 'schedule'
          || inputs.scope == 'gems'
          || inputs.scope == 'all'
        env:
          VPSADMINOS_INPUT: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.vpsadminos_input
                || '' }}
        run: |
          if [ -n "$VPSADMINOS_INPUT" ]; then
            nix flake lock --allow-dirty-locks --override-input vpsadminos "$VPSADMINOS_INPUT"
          fi

          nix develop .#vpsadmin --command bash -lc '
            ./tools/bundix_all.sh
            rake vpsadmin:gems
            nixfmt packages/*/gemset.nix
          '

          git add packages/*/Gemfile packages/*/Gemfile.lock packages/*/gemset.nix
          git diff --cached --quiet && exit 0

          msg=$(mktemp)
          printf '%s\n' "packages: update gem dependencies" > "$msg"
          git commit -F "$msg"
          rm -f "$msg"

      - name: Update webui dependencies
        if: >-
          github.event_name == 'schedule'
          || inputs.scope == 'webui'
          || inputs.scope == 'all'
        run: |
          cd webui

          nix develop ..#webui --command bash -lc '
            composer update
            [ -d vendor ] && rm -rf vendor
            composer2nix --name vpsadmin-webui
            nixfmt composer-env.nix php-packages.nix
          '

          git add composer.lock composer-env.nix php-packages.nix
          git diff --cached --quiet && exit 0

          git commit -m "webui: update dependencies"

      - name: Push updates
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
