name: Client Specs

on:
  push:
    paths:
      - ".github/workflows/client-specs.yml"
      - "flake.lock"
      - "flake.nix"
      - "client/**"
  pull_request:
    paths:
      - ".github/workflows/client-specs.yml"
      - "flake.lock"
      - "flake.nix"
      - "client/**"

concurrency:
  group: client-specs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  client-specs:
    name: client specs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout vpsadmin
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.vpsadminos.org
            extra-trusted-public-keys = cache.vpsadminos.org:wpIJlNZQIhS+0gFf1U3MC9sLZdLW3sh5qakOWGDoDrE=
            fallback = true
            connect-timeout = 15

      - name: Run RSpec
        run: |
          set -euo pipefail

          nix develop .#client --command bash -lc 'bundle exec rspec'
