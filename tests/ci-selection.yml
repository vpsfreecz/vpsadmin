# Path-to-test mapping for selective integration CI.
#
# `.github/workflows/ci.yml` passes changed paths to `tools/select_ci_tests.rb`;
# this file tells the selector which metadata tags to run. `full` rules force
# the whole `tag=ci` suite, `skip` rules skip integration CI when all changed
# files match them, and `select` rules build one `tag=ci && (...)` expression.
#
# Update this file whenever adding, moving, or renaming runtime files, tests, or
# webui Playwright scripts. Prefer a broader tag over missing coverage. See the
# "CI test selection" section in `tests/README.md` for the maintenance workflow
# and validation commands.

skip:
  - "*.md"
  - "**/*.md"
  - "*.mdwn"
  - "**/*.mdwn"
  - "doc/**"
  - ".github/workflows/webui-phpunit.yml"
  - "api/spec/**"
  - "client/spec/**"
  - "console_router/spec/**"
  - "libnodectld/spec/**"
  - "webui/phpunit.xml.dist"
  - "webui/tests/**"

full:
  - ".github/workflows/ci.yml"
  - "flake.nix"
  - "flake.lock"
  - "packages/**"
  - "nixos/**"
  - "api/Gemfile*"
  - "api/config/**"
  - "api/db/migrate/**"
  - "api/db/seeds/**"
  - "api/lib/vpsadmin.rb"
  - "api/lib/vpsadmin/api.rb"
  - "api/lib/vpsadmin/api/plugin/**"
  - "api/models/transaction.rb"
  - "api/models/transaction_chain.rb"
  - "api/models/transaction_chain_concern.rb"
  - "api/models/transaction_confirmation.rb"
  - "plugins/**"
  - "tests/all-tests.nix"
  - "tests/make-test.nix"
  - "tests/ci-selection.yml"
  - "tests/ci-tags.nix"
  - "tests/machines/**"
  - "tests/configs/**"
  - "tests/runner/**"
  - "tests/suite/*/common.nix"
  - "tests/suite/storage/remote-common.nix"
  - "tools/select_ci_tests.rb"

select:
