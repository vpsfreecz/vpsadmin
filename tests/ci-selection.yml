      - "webui/public/keepalive.php"
      - "webui/public/js/**"
      - "webui/public/template/**"
      - "webui/lang/**"
      - "webui/template/template.html"
      - "webui/lib/functions.lib.php"
      - "webui/lib/helpbox.lib.php"
      - "webui/lib/lang.lib.php"
      - "webui/lib/pagination.lib.php"
      - "webui/lib/version.lib.php"
      - "webui/lib/xtemplate.lib.php"
    tags: ["webui"]

  - paths:
